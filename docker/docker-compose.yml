version: '3.8'

services:
  # --------------------------------------------------------------------------
  # 1) Frontend UI & Client App (Nginx Static + Reverse Proxy)
  # --------------------------------------------------------------------------
  justice-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: justice-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public:/app/public
      - ./dashboards:/app/dashboards
      - ./auth:/app/auth
      - ./assets:/app/assets
      - ./courts:/app/courts
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - justice-api
    networks:
      - justice-net
    restart: always

  # --------------------------------------------------------------------------
  # 2) Core API & WSS Engine (Node.js)
  # --------------------------------------------------------------------------
  justice-api:
    image: node:20-alpine
    container_name: justice-backend
    working_dir: /app
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app/api
      - ./config:/app/config
      - ./package.json:/app/package.json
      - ./server.js:/app/server.js
      - ./.env:/app/.env
    command: npm run dev
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://justice-db:27017/justice_platform
      - REDIS_URL=redis://justice-cache:6379
      - JWT_SECRET=dev_super_secret_key_99182
      - AES_MASTER_KEY=change_this_for_prod_32bytes_min!!!
    depends_on:
      - justice-db
      - justice-cache
    networks:
      - justice-net

  # --------------------------------------------------------------------------
  # 3) Database (MongoDB) - For User / Cases / Vault Metadata
  # --------------------------------------------------------------------------
  justice-db:
    image: mongo:6.0
    container_name: justice-mongodb
    ports:
      - "27017:27017"
    volumes:
      - justice-mongo-data:/data/db
    networks:
      - justice-net
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # 4) In-Memory Cache & Message Broker (Redis) - For RTC Signaling & Rate Limit
  # --------------------------------------------------------------------------
  justice-cache:
    image: redis:7.0-alpine
    container_name: justice-redis
    ports:
      - "6379:6379"
    volumes:
      - justice-redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - justice-net

volumes:
  justice-mongo-data:
  justice-redis-data:

networks:
  justice-net:
    driver: bridge
