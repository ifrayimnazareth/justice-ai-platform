<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atur Ulang Sandi Keamanan - Justice AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <style>
        body {
            background-color: var(--bg-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: linear-gradient(135deg, rgba(0, 181, 216, 0.05) 0%, rgba(43, 108, 176, 0.02) 100%);
            padding: var(--space-xl);
        }

        .reset-card {
            background-color: var(--bg-main);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 450px;
            padding: var(--space-2xl);
            border: 1px solid rgba(0,0,0,0.05);
        }

        [data-theme="dark"] .reset-card { border-color: rgba(255,255,255,0.05); }

        .auth-header { text-align: center; margin-bottom: var(--space-xl); }
        .auth-header .logo { justify-content: center; font-size: 2rem; margin-bottom: 5px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(0,0,0,0.15);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            background-color: var(--bg-alt);
            color: var(--text-main);
            transition: all var(--transition-fast);
        }

        [data-theme="dark"] .form-control { border-color: rgba(255,255,255,0.15); }
        .form-control:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1); }

        .criteria-list {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            background-color: var(--bg-alt);
            padding: 15px;
            border-radius: 4px;
        }

        .criteria-list li { margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .criteria-list li.valid { color: var(--success); }
        .criteria-list li.invalid { color: var(--text-muted); }

    </style>
</head>
<body>

    <div class="reset-card animate-fade-in">
        <div class="auth-header">
            <a href="../public/index.html" class="logo">
                <i class="fa-solid fa-scale-balanced" style="color: var(--primary-color);"></i> Justice<span>AI</span>
            </a>
            <h2 style="margin: 15px 0 5px 0; font-family: var(--font-body);">Buat Sandi Master Baru</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0;">Sandi ini akan mengenkripsi ulang Brankas Anda.</p>
        </div>

        <form action="login.html" method="GET">
            <div class="form-group">
                <label class="form-label">Sandi Baru</label>
                <input type="password" class="form-control" id="newPassword" placeholder="Buat sandi yang kuat..." required>
            </div>

            <ul class="criteria-list">
                <li class="invalid" id="req-length"><i class="fa-solid fa-circle-xmark"></i> Minimal 8 Karakter</li>
                <li class="invalid" id="req-number"><i class="fa-solid fa-circle-xmark"></i> Memiliki Angka & Huruf Besar</li>
            </ul>

            <div class="form-group">
                <label class="form-label">Konfirmasi Sandi Baru</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Ketik ulang sandi..." required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">
                Simpan & Enkripsi Kunci <i class="fa-solid fa-lock" style="margin-left: 5px;"></i>
            </button>
        </form>
    </div>

    <script>
        // Simple visual feedback for password strength
        const pwdInput = document.getElementById('newPassword');
        const reqLength = document.getElementById('req-length');
        const reqNumber = document.getElementById('req-number');

        pwdInput.addEventListener('input', function() {
            const val = this.value;
            
            // Length check
            if (val.length >= 8) {
                reqLength.classList.replace('invalid', 'valid');
                reqLength.innerHTML = '<i class="fa-solid fa-circle-check"></i> Minimal 8 Karakter';
            } else {
                reqLength.classList.replace('valid', 'invalid');
                reqLength.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Minimal 8 Karakter';
            }

            // AlphaNumeric check
            if (/[A-Z]/.test(val) && /[0-9]/.test(val)) {
                reqNumber.classList.replace('invalid', 'valid');
                reqNumber.innerHTML = '<i class="fa-solid fa-circle-check"></i> Memiliki Angka & Huruf Besar';
            } else {
                reqNumber.classList.replace('valid', 'invalid');
                reqNumber.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Memiliki Angka & Huruf Besar';
            }
        });
    </script>
</body>
</html>
