<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kode OTP Keamanan - Justice AI</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    
    <style>
        .otp-inputs { display: flex; gap: 10px; margin: 20px 0; justify-content: center; }
        .otp-box { width: 50px; height: 60px; text-align: center; font-size: 1.5rem; font-family: monospace; border: 1px solid rgba(255,255,255,0.1); background-color: rgba(0,0,0,0.3); color: white; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .otp-box:focus { border-color: #58a6ff; outline: none; box-shadow: 0 0 10px rgba(88, 166, 255, 0.4); }
    </style>
</head>
<body>

    <div class="auth-container animate-fade-in" style="justify-content: center; align-items: center; min-height: 100vh; display: flex; width: 100vw; background-color: #0d1117;">
        
        <div class="auth-box" style="width: 100%; max-width: 500px; padding: 50px; text-align: center;">
            <i class="fa-solid fa-mobile-screen-button" style="font-size: 3rem; color: #58a6ff; margin-bottom: 20px;"></i>
            
            <h2 style="font-family: var(--font-heading); color: white; margin-bottom: 15px;">Verifikasi Kepemilikan (OTP)</h2>
            <p style="color: #94a3b8; line-height: 1.6; margin-bottom: 30px;">Kami telah mengirimkan sandi 6 digit (One Time Password) ke WhatsApp Anda berakhiran <b>+62 812-****-4455</b> untuk masuk ke Dashboard.</p>

            <form class="auth-form" action="../dashboards/client/dashboard.html" onsubmit="event.preventDefault(); window.location.href='../dashboards/client/dashboard.html';">
                
                <div class="otp-inputs">
                    <input type="text" class="otp-box" maxlength="1" autofocus required>
                    <input type="text" class="otp-box" maxlength="1" required>
                    <input type="text" class="otp-box" maxlength="1" required>
                    <span style="display: flex; align-items: center; color: #64748b; font-weight: bold;">-</span>
                    <input type="text" class="otp-box" maxlength="1" required>
                    <input type="text" class="otp-box" maxlength="1" required>
                    <input type="text" class="otp-box" maxlength="1" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;"><i class="fa-solid fa-shield-check"></i> Verifikasi Identitas (Login Server)</button>
            </form>

            <div class="auth-footer" style="margin-top: 30px;">
                <p>Belum menerima kode? <a href="#" style="color: #58a6ff; cursor: pointer; text-decoration: underline;">Kirim Ulang Detik: <span id="timer">00:59</span></a></p>
            </div>
            
        </div>
        
    </div>

    <script>
        // Auto Focus Next Input For OTP UX
        const inputs = document.querySelectorAll(".otp-box");
        inputs.forEach((input, index) => {
            input.addEventListener("input", () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && input.value === "" && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
</body>
</html>
